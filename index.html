<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HMW 創意發想工作站 - 完整存圖版</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: '微軟正黑體', sans-serif; margin: 0; padding: 0; background-color: #f4f6f8; display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100vw; overflow-x: hidden; }
        header { width: 100%; background: #2c3e50; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        h1 { font-size: 20px; margin: 0; }
        .nav-btns { display: flex; gap: 10px; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .container { width: 100%; max-width: 1100px; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
        .section-card { background: #ffffff; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .step-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; border-bottom: 2px solid #ecf0f1; padding-bottom: 8px; }
        .step-badge { background: #e74c3c; color: white; padding: 4px 10px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .btn-help { background: #f39c12; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 13px; cursor: pointer; margin-left: auto; }
        .pov-content { font-size: 18px; display: flex; flex-wrap: wrap; gap: 8px; line-height: 1.8; }
        .pov-content input { border: none; border-bottom: 2px solid #ccc; padding: 4px 8px; font-size: 18px; color: #d32f2f; font-weight: bold; text-align: center; }
        .hmw-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 15px; }
        @media (max-width: 768px) { .hmw-grid { grid-template-columns: 1fr; } }
        .hint-box { background: #e0f2f1; padding: 15px; border-radius: 8px; border-left: 5px solid #009688; font-size: 14px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-row input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ced4da; }
        .btn-action { background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .hmw-card { background: #fff9c4; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #fbc02d; font-weight: bold; display: flex; justify-content: space-between; }
        #canvas { width: 100%; height: 600px; background-color: #e9ecef; background-image: radial-gradient(#adb5bd 1px, transparent 1px); background-size: 20px 20px; border-radius: 8px; position: relative; overflow: hidden; border: 1px solid #dee2e6; }
        .note { position: absolute; width: 105px; height: 105px; padding: 8px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; font-size: 15px; border-radius: 4px; box-shadow: 2px 4px 8px rgba(0,0,0,0.2); cursor: grab; background-color: #fff; border: 2px solid #eee; }
        #color-picker { display: none; position: fixed; z-index: 3000; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 140px; }
        .color-opt { padding: 10px; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f0f0f0; }
        .modal { display: none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 10px; width: 100%; max-width: 550px; position: relative; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <header>
        <h1>💡 HMW 工作站</h1>
        <div class="nav-btns">
            <button class="btn-save" onclick="exportToImage()">💾 儲存成果圖</button>
        </div>
    </header>

    <div class="container" id="main-content">
        <div class="section-card">
            <div class="step-header">
                <span class="step-badge">第一步</span> <span class="step-title">POV 專案題目</span>
                <button class="btn-help" onclick="openHelp(1)">💡 怎麼寫？</button>
            </div>
            <div class="pov-content">
                如何協助 <input type="text" value="外國遊客" style="width: 100px;"> 
                在 <input type="text" value="找不到旅館" style="width: 120px;"> 時，克服 
                <input type="text" value="語言不通的情況" style="width: 180px;">，可以 
                <input type="text" value="順利地認路" style="width: 120px;"> ？
            </div>
        </div>

        <div class="section-card">
            <div class="step-header">
                <span class="step-badge">第二步</span> <span class="step-title">轉換視角 (HMW)</span>
                <button class="btn-help" onclick="openHelp(2)">💡 怎麼問？</button>
            </div>
            <div class="hmw-grid">
                <div class="hint-box">
                    <h3>🔍 思考提示：</h3>
                    A.有趣化 | B.去障礙 | C.科技感 | D.人際力
                </div>
                <div>
                    <div class="input-row">
                        <input type="text" id="hmw-input" placeholder="我們該如何...">
                        <button class="btn-action" onclick="addHMW()">➕ 新增</button>
                    </div>
                    <div id="hmw-list"></div>
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="step-header">
                <span class="step-badge">第三/四步</span> <span class="step-title">發散與收斂</span>
                <button class="btn-help" onclick="openHelp(3)">💡 怎麼操作？</button>
            </div>
            <div class="input-row">
                <input type="text" id="note-input" placeholder="想到什麼解法？快速輸入...">
                <button class="btn-action" onclick="addNote()">➕ 生成便利貼</button>
            </div>
            <div id="canvas"></div>
        </div>
    </div>

    <div id="color-picker">
        <div class="color-opt" style="background:#fff3bf" onclick="setNoteColor('#fff3bf')">🟨 企劃活動</div>
        <div class="color-opt" style="background:#d3f9d8" onclick="setNoteColor('#d3f9d8')">🟩 科技數位</div>
        <div class="color-opt" style="background:#e7f5ff" onclick="setNoteColor('#e7f5ff')">🟦 視覺空間</div>
        <div class="color-opt" style="background:#ffe3e3" onclick="setNoteColor('#ffe3e3')">🟥 痛點救援</div>
    </div>

    <script>
        function exportToImage() {
            const btn = document.querySelector('.btn-save');
            btn.innerText = "正在產圖...";
            
            // 使用 html2canvas 抓取整塊 container
            html2canvas(document.querySelector("#main-content"), {
                scale: 2, // 提高解析度
                useCORS: true,
                logging: false,
                backgroundColor: "#f4f6f8"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `HMW_成果_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                btn.innerText = "💾 儲存成果圖";
                alert("成果圖已下載！若手機未自動下載，請長按圖片儲存。");
            });
        }

        // --- 以下為原本的 HMW、便利貼、拖曳與 Modal 邏輯 ---
        function addHMW() {
            const val = document.getElementById('hmw-input').value;
            if(!val) return;
            const card = document.createElement('div');
            card.className = 'hmw-card';
            card.innerHTML = `<span>✨ 我們該如何${val.replace('我們該如何','')}</span> <span onclick="this.parentElement.remove()">×</span>`;
            document.getElementById('hmw-list').appendChild(card);
            document.getElementById('hmw-input').value = "";
        }

        function addNote() {
            const val = document.getElementById('note-input').value || "新點子";
            const note = document.createElement('div');
            note.className = 'note';
            note.innerText = val;
            note.style.left = '50px'; note.style.top = '50px';
            bindInteractions(note);
            document.getElementById('canvas').appendChild(note);
            document.getElementById('note-input').value = "";
        }

        function bindInteractions(el) {
            let isDragging = false, startX, startY, initL, initT;
            el.addEventListener('pointerdown', e => {
                isDragging = false; el.setPointerCapture(e.pointerId);
                startX = e.clientX; startY = e.clientY; initL = el.offsetLeft; initT = el.offsetTop;
            });
            el.addEventListener('pointermove', e => {
                if (!el.hasPointerCapture(e.pointerId)) return;
                if (Math.abs(e.clientX - startX) > 5) isDragging = true;
                if (isDragging) {
                    el.style.left = (e.clientX - startX + initL) + 'px';
                    el.style.top = (e.clientY - startY + initT) + 'px';
                }
            });
            el.addEventListener('pointerup', e => {
                el.releasePointerCapture(e.pointerId);
                if (!isDragging) {
                    activeNote = el;
                    const picker = document.getElementById('color-picker');
                    picker.style.display = 'block';
                    picker.style.left = e.clientX + 'px'; picker.style.top = e.clientY + 'px';
                } else {
                    // 拖出銷毀邏輯
                    if(el.offsetLeft < -20 || el.offsetTop < -20) el.remove();
                }
            });
        }

        let activeNote = null;
        function setNoteColor(col) {
            if(activeNote) activeNote.style.backgroundColor = col;
            document.getElementById('color-picker').style.display = 'none';
        }
    </script>
</body>
</html>
